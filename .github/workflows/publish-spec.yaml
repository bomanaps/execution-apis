name: Publish stamped spec branch (manual recovery)

# Normal flow lives in release.yaml as the `publish-spec` job (needs: github-release).
# This workflow exists ONLY as a manual recovery hatch when you want to re-push the
# assembled-spec branch from an existing GitHub Release without re-running the full
# build pipeline. It downloads the stamped openrpc.json / refs-openrpc.json directly
# from the release assets.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag whose stamped spec should be published, e.g. v1.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify release has required assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          assets=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name')
          missing=0
          for required in openrpc.json refs-openrpc.json; do
            if ! printf '%s\n' "$assets" | grep -qx "$required"; then
              echo "::error::release $TAG is missing required asset: $required"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Available assets:"
            printf '%s\n' "$assets" || true
            echo "Re-run the Release workflow (workflow_dispatch with tag=$TAG) to attach assets."
            exit 1
          fi

      - name: Download stamped spec from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern openrpc.json \
            --pattern refs-openrpc.json \
            --clobber

      - name: Setup git config
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push assembled spec branch
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          git checkout -B assembled-spec
          git add -f openrpc.json refs-openrpc.json
          if git diff --cached --quiet; then
            echo "no changes to commit; nothing to publish"
            exit 0
          fi
          git commit -m "release ${TAG}"
          git push -fu origin assembled-spec
